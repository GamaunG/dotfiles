<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <!-- NFI = Nerd Font Icons    -->
    <!-- SNF = Symbols Nerd Font  -->
    <!-- NCE = Noto Color Emoji   -->
    <!-- ACE = Apple Color Emoji  -->


    <!-- §1 Strip ASCII (0x00–0x7F) from SNF and ACE.
         Firefox respects fontconfig charset for glyph selection; prevents these fonts
         from being used for regular text characters and space metrics. -->

    <match target="scan">
        <test name="family">
            <string>Apple Color Emoji</string>
        </test>
        <edit mode="assign" name="charset">
            <minus>
                <name>charset</name>
                <charset>
                    <range>
                        <int>0x0000</int>
                        <int>0x007F</int>
                    </range>
                </charset>
            </minus>
        </edit>
    </match>
    <match target="scan">
        <test name="family">
            <string>Symbols Nerd Font</string>
        </test>
        <edit mode="assign" name="charset">
            <minus>
                <name>charset</name>
                <charset>
                    <range>
                        <int>0x0000</int>
                        <int>0x007F</int>
                    </range>
                </charset>
            </minus>
        </edit>
    </match>


    <!-- §2 Generic family aliases.
         Inter at position 1 — FcFontMatch returns Inter for weight queries (DMS works).
         SNF at position 2 — present in FcFontSort for apps that iterate the sorted list.
         ACE in aliases only to avoid triggering Firefox's emoji handler system-wide. -->

    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Inter</family>
            <family>Symbols Nerd Font</family>
            <family>Apple Color Emoji</family>
        </prefer>
    </alias>
    <alias>
        <family>serif</family>
        <prefer>
            <family>DejaVu Serif</family>
            <family>Symbols Nerd Font</family>
            <family>Apple Color Emoji</family>
        </prefer>
    </alias>
    <alias>
        <family>system-ui</family>
        <prefer>
            <family>Inter</family>
            <family>Symbols Nerd Font</family>
            <family>Apple Color Emoji</family>
        </prefer>
    </alias>
    <alias>
        <family>ui-sans-serif</family>
        <prefer>
            <family>Inter</family>
            <family>Symbols Nerd Font</family>
            <family>Apple Color Emoji</family>
        </prefer>
    </alias>
    <alias>
        <family>cursive</family>
        <prefer>
            <family>Inter</family>
            <family>Symbols Nerd Font</family>
            <family>Apple Color Emoji</family>
        </prefer>
    </alias>
    <alias>
        <family>fantasy</family>
        <prefer>
            <family>Impact</family>
            <family>Symbols Nerd Font</family>
            <family>Apple Color Emoji</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>emoji</family>
        <prefer>
            <family>Inter</family>
            <family>Symbols Nerd Font</family>
            <family>Apple Color Emoji</family>
        </prefer>
    </alias>


    <!-- §3 Monospace: strong binding preserves terminal glyph metrics. -->

    <alias binding="strong">
        <family>monospace</family>
        <prefer>
            <family>FiraCode Nerd Font</family>
            <family>JetBrainsMono Nerd Font</family>
            <family>Noto Sans Symbols 2</family>
            <family>Symbols Nerd Font</family>
            <family>Apple Color Emoji</family>
        </prefer>
    </alias>


    <!-- §4 Replace browser-bundled emoji fonts with ACE. -->

    <match target="pattern">
        <test name="family" qual="any">
            <string>Twemoji Mozilla</string>
        </test>
        <edit binding="strong" mode="prepend" name="family">
            <string>Apple Color Emoji</string>
        </edit>
    </match>
    <match target="pattern">
        <test name="family" qual="any">
            <string>Noto Color Emoji</string>
        </test>
        <edit binding="strong" mode="prepend" name="family">
            <string>Apple Color Emoji</string>
        </edit>
    </match>


    <!-- §5 Inter OpenType features. Ignored by Chrome; respected by Firefox, Qt and GTK.
         https://rsms.me/inter -->

    <match target="font">
        <test compare="contains" name="family">
            <string>Inter</string>
        </test>
        <edit mode="assign_replace" name="fontfeatures">
            <string>cv03</string>
            <string>cv04</string>
            <string>cv05</string>
            <string>cv08</string>
            <string>tnum</string>
        </edit>
    </match>


    <!-- §6 SNF injection for generic CSS family contexts.
         Fixes NFI not visible in generic CSS family rows in browsers.
         Fires only when the named generic is present in the font stack.
         Skips stacks using only specific named fonts — NFI will not appear there.
         "monospace" is redundant (§3 covers it via FiraCode NF), but harmless.
         "ui-monospace" is a distinct keyword from "monospace" — sites like ChatGPT
         use it as the leading family without a plain "monospace" fallback.

         BREAKS: Font weight via generic CSS family names (sans-serif, serif, etc.) always
         resolves to SNF Regular instead of the intended Inter weight variant.
         Explicit font names ("Inter", etc.) and terminals are not affected. -->

    <match target="pattern">
        <test compare="eq" name="family" qual="any">
            <string>sans-serif</string>
        </test>
        <edit binding="strong" mode="append" name="family">
            <string>Symbols Nerd Font</string>
        </edit>
    </match>
    <match target="pattern">
        <test compare="eq" name="family" qual="any">
            <string>serif</string>
        </test>
        <edit binding="strong" mode="append" name="family">
            <string>Symbols Nerd Font</string>
        </edit>
    </match>
    <match target="pattern">
        <test compare="eq" name="family" qual="any">
            <string>system-ui</string>
        </test>
        <edit binding="strong" mode="append" name="family">
            <string>Symbols Nerd Font</string>
        </edit>
    </match>
    <match target="pattern">
        <test compare="eq" name="family" qual="any">
            <string>ui-sans-serif</string>
        </test>
        <edit binding="strong" mode="append" name="family">
            <string>Symbols Nerd Font</string>
        </edit>
    </match>
    <match target="pattern">
        <test compare="eq" name="family" qual="any">
            <string>ui-serif</string>
        </test>
        <edit binding="strong" mode="append" name="family">
            <string>Symbols Nerd Font</string>
        </edit>
    </match>
    <match target="pattern">
        <test compare="eq" name="family" qual="any">
            <string>cursive</string>
        </test>
        <edit binding="strong" mode="append" name="family">
            <string>Symbols Nerd Font</string>
        </edit>
    </match>
    <match target="pattern">
        <test compare="eq" name="family" qual="any">
            <string>fantasy</string>
        </test>
        <edit binding="strong" mode="append" name="family">
            <string>Symbols Nerd Font</string>
        </edit>
    </match>
    <match target="pattern">
        <test compare="eq" name="family" qual="any">
            <string>monospace</string>
        </test>
        <edit binding="strong" mode="append" name="family">
            <string>Symbols Nerd Font</string>
        </edit>
    </match>
    <match target="pattern">
        <test compare="eq" name="family" qual="any">
            <string>ui-monospace</string>
        </test>
        <edit binding="strong" mode="append" name="family">
            <string>Symbols Nerd Font</string>
        </edit>
    </match>

    <!-- Alternative §6: fires for all non-monospace patterns, including icon font requests.
         Covers named-font-only stacks but causes Firefox icon/layout shifts on
         some websites (e.g. GitHub).
         Uncomment below and comment the rules above to switch -->

    <!-- <match target="pattern"> -->
    <!--     <test compare="not_eq" name="family" qual="all"> -->
    <!--         <string>monospace</string> -->
    <!--     </test> -->
    <!--     <edit binding="strong" mode="append" name="family"> -->
    <!--         <string>Symbols Nerd Font</string> -->
    <!--     </edit> -->
    <!-- </match> -->

</fontconfig>
